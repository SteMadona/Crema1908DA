name: Render and publish Quarto website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::tidyverse
            any::ggplot2
            any::dplyr
            any::tidyr
            any::readr
            any::purrr
            any::stringr
            any::lubridate
            any::janitor
            any::scales
            any::knitr
            any::kableExtra
            any::gt
            any::DT
            any::plotly
            any::htmltools
            any::htmlwidgets
            any::ggrepel
            any::patchwork
            any::cowplot
            any::viridis
            any::here

      - name: Render Quarto website
        run: quarto render

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4